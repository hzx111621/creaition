<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager - 测试面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #18181f;
            --bg-card: #1e1e28;
            --bg-card-hover: #252532;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --accent: #7c5cfc;
            --accent-light: #9d7fff;
            --accent-dim: rgba(124, 92, 252, 0.15);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            font-size: 0.85rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .result-box {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .copy-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .result-content {
            padding: 16px;
            background: var(--bg-primary);
            font-size: 0.9rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-content::-webkit-scrollbar {
            width: 6px;
        }

        .result-content::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .result-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .result-content .tag {
            display: inline-block;
            padding: 3px 10px;
            background: var(--accent-dim);
            color: var(--accent-light);
            border-radius: 20px;
            font-size: 0.82rem;
            margin: 2px;
        }

        .result-content .priority-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .priority-high { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
        .priority-medium { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .priority-low { background: rgba(52, 211, 153, 0.15); color: var(--success); }

        .subtask-item {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.88rem;
            border-left: 3px solid var(--accent);
        }

        .subtask-item strong {
            color: var(--accent-light);
            font-size: 0.75rem;
            display: block;
            margin-bottom: 2px;
        }

        .error-box {
            padding: 14px 16px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 10px;
            color: var(--danger);
            font-size: 0.88rem;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .task-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .task-card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .task-card-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .task-card-meta .tag {
            background: var(--accent-dim);
            color: var(--accent-light);
            padding: 1px 8px;
            border-radius: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container { padding: 20px 12px; }
            header h1 { font-size: 1.6rem; }
            .tabs { gap: 2px; }
            .tab-btn { padding: 8px 10px; font-size: 0.8rem; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Task Manager</h1>
            <p>智能任务管理 - AI 功能测试面板</p>
            <div class="status-bar">
                <span><span class="status-dot" id="statusDot"></span> <span id="statusText">检查连接...</span></span>
                <span id="modelText"></span>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="parse">自然语言解析</button>
            <button class="tab-btn" data-tab="tags">智能标签推荐</button>
            <button class="tab-btn" data-tab="priority">优先级推荐</button>
            <button class="tab-btn" data-tab="breakdown">任务分解</button>
            <button class="tab-btn" data-tab="summarize">任务摘要</button>
            <button class="tab-btn" data-tab="tasks">任务列表</button>
        </div>

        <!-- Parse Task -->
        <div class="tab-content active" id="tab-parse">
            <div class="card">
                <div class="card-title">自然语言解析</div>
                <div class="card-desc">输入自然语言，自动提取标题、描述、优先级、标签和截止日期</div>
                <div class="input-group">
                    <label>输入描述</label>
                    <textarea id="parseInput" placeholder="例如：明天下午3点提醒我开会讨论项目进度，需要准备PPT">明天下午3点提醒我开会讨论项目进度</textarea>
                </div>
                <div class="btn-row">
                    <button class="btn" onclick="parseTask()">解析任务</button>
                </div>
                <div class="result-box" id="parseResult"></div>
            </div>
        </div>

        <!-- Suggest Tags -->
        <div class="tab-content" id="tab-tags">
            <div class="card">
                <div class="card-title">智能标签推荐</div>
                <div class="card-desc">根据任务内容，AI 自动推荐合适的标签</div>
                <div class="input-group">
                    <label>任务标题</label>
                    <input type="text" id="tagsTitle" placeholder="例如：Review pull request" value="Review pull request">
                </div>
                <div class="input-group">
                    <label>任务描述（可选）</label>
                    <textarea id="tagsDesc" placeholder="例如：Code review for authentication module" rows="2">Code review for authentication module</textarea>
                </div>
                <div class="btn-row">
                    <button class="btn" onclick="suggestTags()">推荐标签</button>
                </div>
                <div class="result-box" id="tagsResult"></div>
            </div>
        </div>

        <!-- Suggest Priority -->
        <div class="tab-content" id="tab-priority">
            <div class="card">
                <div class="card-title">优先级推荐</div>
                <div class="card-desc">AI 分析任务紧急程度，推荐合适的优先级</div>
                <div class="input-group">
                    <label>任务标题</label>
                    <input type="text" id="priorityTitle" placeholder="例如：Fix critical production bug" value="Fix critical production bug">
                </div>
                <div class="input-group">
                    <label>任务描述（可选）</label>
                    <textarea id="priorityDesc" placeholder="例如：Users are reporting login failures" rows="2">Users are reporting login failures across all regions</textarea>
                </div>
                <div class="btn-row">
                    <button class="btn" onclick="suggestPriority()">推荐优先级</button>
                </div>
                <div class="result-box" id="priorityResult"></div>
            </div>
        </div>

        <!-- Breakdown Task -->
        <div class="tab-content" id="tab-breakdown">
            <div class="card">
                <div class="card-title">任务分解</div>
                <div class="card-desc">将复杂任务拆分为 3-7 个可执行的简单子任务</div>
                <div class="input-group">
                    <label>任务标题</label>
                    <input type="text" id="breakdownTitle" placeholder="例如：Build a web application" value="Build a web application">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>任务描述（可选）</label>
                        <textarea id="breakdownDesc" placeholder="描述任务的具体要求" rows="2"></textarea>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn" onclick="breakdownTask()">分解任务</button>
                </div>
                <div class="result-box" id="breakdownResult"></div>
            </div>
        </div>

        <!-- Summarize Tasks -->
        <div class="tab-content" id="tab-summarize">
            <div class="card">
                <div class="card-title">任务摘要</div>
                <div class="card-desc">AI 根据当前所有任务生成简洁的摘要和分析</div>
                <div class="btn-row">
                    <button class="btn" onclick="summarizeTasks()">生成摘要</button>
                </div>
                <div class="result-box" id="summarizeResult"></div>
            </div>
        </div>

        <!-- Task List -->
        <div class="tab-content" id="tab-tasks">
            <div class="card">
                <div class="card-title">创建任务</div>
                <div class="card-desc">填写任务信息后点击创建，支持按自然语言描述任务</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="input-group">
                        <label>任务标题 *</label>
                        <input type="text" id="createTitle" placeholder="例如：完成项目报告">
                    </div>
                    <div class="input-group">
                        <label>优先级</label>
                        <select id="createPriority" style="width:100%;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;">
                            <option value="">自动</option>
                            <option value="low">低 (low)</option>
                            <option value="medium" selected>中 (medium)</option>
                            <option value="high">高 (high)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>任务描述</label>
                    <textarea id="createDesc" placeholder="详细描述任务内容..." rows="2"></textarea>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="input-group">
                        <label>截止日期</label>
                        <input type="date" id="createDueDate" style="width:100%;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;">
                    </div>
                    <div class="input-group">
                        <label>标签（逗号分隔）</label>
                        <input type="text" id="createTags" placeholder="例如：work, important">
                    </div>
                </div>
                <div class="btn-row" style="margin-top:4px;">
                    <button class="btn" onclick="createTask()">创建任务</button>
                    <button class="btn btn-secondary" onclick="useAiParse()">AI 解析</button>
                </div>
                <div class="result-box" id="createResult" style="display:none; margin-top:16px;"></div>
            </div>

            <div class="card">
                <div class="card-title">任务列表</div>
                <div class="card-desc" id="tasksCount">共 0 个任务</div>
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
                    <select id="filterStatus" onchange="loadTasks()" style="padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.85rem;font-family:inherit;">
                        <option value="">全部状态</option>
                        <option value="pending">待处理</option>
                        <option value="in_progress">进行中</option>
                        <option value="completed">已完成</option>
                    </select>
                    <select id="filterPriority" onchange="loadTasks()" style="padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.85rem;font-family:inherit;">
                        <option value="">全部优先级</option>
                        <option value="high">高</option>
                        <option value="medium">中</option>
                        <option value="low">低</option>
                    </select>
                    <input type="text" id="filterTag" onchange="loadTasks()" placeholder="按标签筛选" style="padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.85rem;width:140px;">
                    <button class="btn btn-secondary" onclick="loadTasks()" style="padding:8px 16px;">刷新</button>
                </div>
                <div id="tasksList"></div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // Check API connection on load
        async function checkHealth() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    dot.classList.add('connected');
                    text.textContent = 'API 已连接';
                } else {
                    text.textContent = 'API 连接失败';
                }
            } catch (e) {
                text.textContent = 'API 未运行（请先启动后端服务）';
            }
        }

        checkHealth();

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.dataset.tab;
                document.getElementById(`tab-${tabId}`).classList.add('active');
                if (tabId === 'tasks') loadTasks();
            });
        });

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        function renderError(containerId, msg) {
            document.getElementById(containerId).innerHTML = `
                <div class="result-header">
                    <span class="result-label"><span class="dot" style="background:var(--danger)"></span>错误</span>
                    <button class="copy-btn" onclick="copyResult('${containerId}')">复制</button>
                </div>
                <div class="result-content"><div class="error-box">${msg}</div></div>`;
        }

        function renderSuccess(containerId, content) {
            document.getElementById(containerId).innerHTML = `
                <div class="result-header">
                    <span class="result-label"><span class="dot"></span>结果</span>
                    <button class="copy-btn" onclick="copyResult('${containerId}')">复制</button>
                </div>
                <div class="result-content">${content}</div>`;
        }

        async function copyResult(containerId) {
            const el = document.querySelector(`#${containerId} .result-content`);
            if (!el) return;
            try {
                const text = el.querySelector('.error-box')?.textContent || el.textContent;
                await navigator.clipboard.writeText(text.trim());
            } catch (e) {}
        }

        function priorityClass(p) {
            const pstr = String(p).toLowerCase();
            if (pstr.includes('high')) return 'priority-high';
            if (pstr.includes('medium') || pstr.includes('med')) return 'priority-medium';
            if (pstr.includes('low')) return 'priority-low';
            return '';
        }

        // Parse Task
        async function parseTask() {
            const text = document.getElementById('parseInput').value.trim();
            if (!text) { renderError('parseResult', '请输入任务描述'); return; }
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/parse-task`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '解析失败');
                renderSuccess('parseResult', formatParseResult(data));
            } catch (e) {
                hideLoading();
                renderError('parseResult', e.message);
            }
        }

        function formatParseResult(data) {
            let html = '';
            if (data.title) html += `<strong>标题：</strong>${escapeHtml(data.title)}<br><br>`;
            if (data.description) html += `<strong>描述：</strong>${escapeHtml(data.description)}<br><br>`;
            if (data.priority) html += `<strong>优先级：</strong><span class="priority-badge ${priorityClass(data.priority)}">${escapeHtml(data.priority)}</span><br><br>`;
            if (data.tags && data.tags.length) html += `<strong>标签：</strong> ${data.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}<br><br>`;
            if (data.due_date) html += `<strong>截止日期：</strong>${escapeHtml(data.due_date)}`;
            if (!html) return escapeHtml(JSON.stringify(data, null, 2));
            return html;
        }

        // Suggest Tags
        async function suggestTags() {
            const title = document.getElementById('tagsTitle').value.trim();
            const description = document.getElementById('tagsDesc').value.trim();
            if (!title) { renderError('tagsResult', '请输入任务标题'); return; }
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/suggest-tags`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '推荐失败');
                const tags = data.tags || [];
                if (tags.length) {
                    renderSuccess('tagsResult', tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(' '));
                } else {
                    renderSuccess('tagsResult', escapeHtml(JSON.stringify(data, null, 2)));
                }
            } catch (e) {
                hideLoading();
                renderError('tagsResult', e.message);
            }
        }

        // Suggest Priority
        async function suggestPriority() {
            const title = document.getElementById('priorityTitle').value.trim();
            const description = document.getElementById('priorityDesc').value.trim();
            if (!title) { renderError('priorityResult', '请输入任务标题'); return; }
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/suggest-priority`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '推荐失败');
                const p = data.priority || '';
                renderSuccess('priorityResult', `<span class="priority-badge ${priorityClass(p)}">${escapeHtml(p)}</span>`);
            } catch (e) {
                hideLoading();
                renderError('priorityResult', e.message);
            }
        }

        // Breakdown Task
        async function breakdownTask() {
            const title = document.getElementById('breakdownTitle').value.trim();
            const description = document.getElementById('breakdownDesc').value.trim();
            if (!title) { renderError('breakdownResult', '请输入任务标题'); return; }
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/breakdown-task`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '分解失败');
                renderSuccess('breakdownResult', formatBreakdownResult(data));
            } catch (e) {
                hideLoading();
                renderError('breakdownResult', e.message);
            }
        }

        function formatBreakdownResult(data) {
            const subs = data.subtasks || [];
            if (subs.length) {
                return subs.map((s, i) => {
                    if (typeof s === 'string') return `<div class="subtask-item"><strong>子任务 ${i + 1}</strong>${escapeHtml(s)}</div>`;
                    return `<div class="subtask-item"><strong>子任务 ${i + 1}</strong>${escapeHtml(s.title || s.name || JSON.stringify(s))}</div>`;
                }).join('');
            }
            return escapeHtml(JSON.stringify(data, null, 2));
        }

        // Summarize Tasks
        async function summarizeTasks() {
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/summarize-tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '摘要生成失败');
                let html = '';
                if (data.total_tasks !== undefined) html += `<strong>共 ${data.total_tasks} 个任务</strong><br><br>`;
                html += escapeHtml(data.summary || '');
                renderSuccess('summarizeResult', html || '无任务数据');
            } catch (e) {
                hideLoading();
                renderError('summarizeResult', e.message);
            }
        }

        // Create Task
        async function createTask(fromAiResult) {
            const title = document.getElementById('createTitle').value.trim();
            const description = document.getElementById('createDesc').value.trim();
            const priority = document.getElementById('createPriority').value;
            const due_date = document.getElementById('createDueDate').value;
            const tagsStr = document.getElementById('createTags').value.trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : undefined;

            const body = {};
            if (title) body.title = title;
            if (description) body.description = description;
            if (priority) body.priority = priority;
            if (due_date) body.due_date = due_date;
            if (tags) body.tags = tags;

            if (fromAiResult) {
                if (fromAiResult.title) body.title = fromAiResult.title;
                if (fromAiResult.description) body.description = fromAiResult.description;
                if (fromAiResult.priority) body.priority = fromAiResult.priority;
                if (fromAiResult.due_date) body.due_date = fromAiResult.due_date;
                if (fromAiResult.tags && fromAiResult.tags.length) body.tags = fromAiResult.tags;
                document.getElementById('createTitle').value = fromAiResult.title || '';
                document.getElementById('createDesc').value = fromAiResult.description || '';
                document.getElementById('createPriority').value = fromAiResult.priority || 'medium';
                document.getElementById('createDueDate').value = fromAiResult.due_date ? fromAiResult.due_date.split('T')[0] : '';
                document.getElementById('createTags').value = (fromAiResult.tags || []).join(', ');
            }

            if (!title && !fromAiResult) {
                const box = document.getElementById('createResult');
                box.style.display = 'block';
                box.innerHTML = `<div class="error-box">请输入任务标题</div>`;
                return;
            }

            showLoading();
            try {
                const res = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                hideLoading();
                const box = document.getElementById('createResult');
                box.style.display = 'block';
                if (!res.ok) {
                    box.innerHTML = `<div class="error-box">${data.detail || '创建失败'}</div>`;
                    return;
                }
                box.innerHTML = `<div class="result-content" style="color:var(--success);padding:12px 16px;background:rgba(52,211,153,0.1);border-radius:10px;">创建成功！<strong>${escapeHtml(data.title)}</strong> (ID: ${data.id})</div>`;
                document.getElementById('createTitle').value = '';
                document.getElementById('createDesc').value = '';
                document.getElementById('createPriority').value = 'medium';
                document.getElementById('createDueDate').value = '';
                document.getElementById('createTags').value = '';
                loadTasks();
            } catch (e) {
                hideLoading();
                const box = document.getElementById('createResult');
                box.style.display = 'block';
                box.innerHTML = `<div class="error-box">${e.message}</div>`;
            }
        }

        // Use AI parse result to fill form
        async function useAiParse() {
            const text = document.getElementById('createTitle').value.trim();
            if (!text) {
                const box = document.getElementById('createResult');
                box.style.display = 'block';
                box.innerHTML = `<div class="error-box">请先输入任务描述，再点击 AI 解析</div>`;
                return;
            }
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/ai/parse-task`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                hideLoading();
                if (!res.ok) throw new Error(data.detail || '解析失败');
                createTask(data);
            } catch (e) {
                hideLoading();
                const box = document.getElementById('createResult');
                box.style.display = 'block';
                box.innerHTML = `<div class="error-box">${e.message}</div>`;
            }
        }

        // Load Tasks with filters
        async function loadTasks() {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const tag = document.getElementById('filterTag').value.trim();
            const params = new URLSearchParams();
            if (status) params.append('status', status);
            if (priority) params.append('priority', priority);
            if (tag) params.append('tag', tag);
            const query = params.toString();
            try {
                const res = await fetch(`${API_BASE}/tasks${query ? '?' + query : ''}`);
                const tasks = await res.json();
                const container = document.getElementById('tasksList');
                const countEl = document.getElementById('tasksCount');
                countEl.textContent = `共 ${tasks.length} 个任务`;
                if (!tasks.length) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div>暂无任务，请先创建</div>';
                    return;
                }
                container.innerHTML = '<div class="tasks-grid">' + tasks.map(t => `
                    <div class="task-card">
                        <div class="task-card-title">${escapeHtml(t.title)}</div>
                        ${t.description ? `<div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px;">${escapeHtml(t.description)}</div>` : ''}
                        <div class="task-card-meta">
                            <span class="priority-badge ${priorityClass(t.priority)}">${escapeHtml(t.priority)}</span>
                            <span style="padding:2px 8px;background:var(--bg-card);border-radius:20px;font-size:0.75rem;">${statusLabel(t.status)}</span>
                            ${(t.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                            ${t.due_date ? `<span style="font-size:0.75rem;color:var(--text-secondary);">📅 ${escapeHtml(t.due_date)}</span>` : ''}
                        </div>
                        <div style="display:flex;gap:6px;margin-top:10px;">
                            <button onclick="showEditForm('${t.id}')" style="flex:1;padding:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);cursor:pointer;font-size:0.8rem;font-family:inherit;">编辑</button>
                            <button onclick="deleteTask('${t.id}')" style="flex:1;padding:6px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:6px;color:var(--danger);cursor:pointer;font-size:0.8rem;font-family:inherit;">删除</button>
                        </div>
                    </div>
                `).join('') + '</div>';
            } catch (e) {
                document.getElementById('tasksList').innerHTML = `<div class="error-box">加载失败: ${e.message}</div>`;
            }
        }

        function statusLabel(s) {
            const map = { pending: '待处理', in_progress: '进行中', completed: '已完成' };
            return map[s] || s;
        }

        // Show edit form in-place
        async function showEditForm(taskId) {
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}`);
                if (!res.ok) return;
                const t = await res.json();
                const card = document.querySelector(`.task-card[data-id="${taskId}"]`) || document.querySelectorAll('.task-card')[Array.from(document.querySelectorAll('.task-card')).findIndex(c => c.innerHTML.includes(taskId))];
                const allCards = document.querySelectorAll('.task-card');
                let cardIndex = -1;
                for (let i = 0; i < allCards.length; i++) {
                    if (allCards[i].innerHTML.includes(taskId)) { cardIndex = i; break; }
                }
                const html = `
                    <div style="padding:12px;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--accent);">
                        <div class="input-group" style="margin-bottom:10px;">
                            <label style="font-size:0.78rem;color:var(--text-secondary);">标题</label>
                            <input type="text" id="editTitle_${taskId}" value="${escapeHtml(t.title || '')}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;font-family:inherit;">
                        </div>
                        <div class="input-group" style="margin-bottom:10px;">
                            <label style="font-size:0.78rem;color:var(--text-secondary);">描述</label>
                            <textarea id="editDesc_${taskId}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;resize:vertical;min-height:50px;font-family:inherit;">${escapeHtml(t.description || '')}</textarea>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
                            <div>
                                <label style="font-size:0.78rem;color:var(--text-secondary);">优先级</label>
                                <select id="editPriority_${taskId}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;font-family:inherit;">
                                    <option value="low" ${t.priority==='low'?'selected':''}>低</option>
                                    <option value="medium" ${t.priority==='medium'?'selected':''}>中</option>
                                    <option value="high" ${t.priority==='high'?'selected':''}>高</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size:0.78rem;color:var(--text-secondary);">状态</label>
                                <select id="editStatus_${taskId}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;font-family:inherit;">
                                    <option value="pending" ${t.status==='pending'?'selected':''}>待处理</option>
                                    <option value="in_progress" ${t.status==='in_progress'?'selected':''}>进行中</option>
                                    <option value="completed" ${t.status==='completed'?'selected':''}>已完成</option>
                                </select>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
                            <div>
                                <label style="font-size:0.78rem;color:var(--text-secondary);">截止日期</label>
                                <input type="date" id="editDueDate_${taskId}" value="${t.due_date ? t.due_date.split('T')[0] : ''}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;font-family:inherit;">
                            </div>
                            <div>
                                <label style="font-size:0.78rem;color:var(--text-secondary);">标签（逗号分隔）</label>
                                <input type="text" id="editTags_${taskId}" value="${(t.tags || []).join(', ')}" style="padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.88rem;width:100%;font-family:inherit;">
                            </div>
                        </div>
                        <div style="display:flex;gap:6px;">
                            <button onclick="updateTask('${taskId}')" style="flex:1;padding:8px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:0.85rem;font-weight:500;font-family:inherit;">保存</button>
                            <button onclick="loadTasks()" style="flex:1;padding:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);cursor:pointer;font-size:0.85rem;font-family:inherit;">取消</button>
                        </div>
                    </div>`;

                const grid = container.parentElement;
                if (cardIndex >= 0 && grid) {
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = html;
                    grid.replaceChild(wrapper.firstElementChild, grid.children[cardIndex]);
                }
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        async function updateTask(taskId) {
            const body = {};
            const title = document.getElementById(`editTitle_${taskId}`).value.trim();
            const description = document.getElementById(`editDesc_${taskId}`).value.trim();
            const priority = document.getElementById(`editPriority_${taskId}`).value;
            const status = document.getElementById(`editStatus_${taskId}`).value;
            const due_date = document.getElementById(`editDueDate_${taskId}`).value;
            const tagsStr = document.getElementById(`editTags_${taskId}`).value.trim();
            if (title) body.title = title;
            if (description !== undefined) body.description = description;
            if (priority) body.priority = priority;
            if (status) body.status = status;
            if (due_date) body.due_date = due_date;
            if (tagsStr) body.tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);

            showLoading();
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                hideLoading();
                if (!res.ok) {
                    const data = await res.json();
                    alert('更新失败: ' + (data.detail || '未知错误'));
                    return;
                }
                loadTasks();
            } catch (e) {
                hideLoading();
                alert('更新失败: ' + e.message);
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            showLoading();
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}`, { method: 'DELETE' });
                hideLoading();
                if (!res.ok) {
                    alert('删除失败');
                    return;
                }
                loadTasks();
            } catch (e) {
                hideLoading();
                alert('删除失败: ' + e.message);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
